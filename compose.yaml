version: '3.8'

services:
  web:
    image: my-first-fast-image:v0.1
    container_name: my-first-contianer-fast-apppppp
    build:
      context: ./src/data-api
    ports:
    - "8000:8000"
    volumes:
      - ./src/data-api:/app  # Mount the application code
    environment:
      - UVICORN_RELOAD=1 # Enable auto-reloading
